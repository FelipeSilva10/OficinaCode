name: Build Alpha

on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # BUILD WINDOWS (.exe via NSIS)
  # ──────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependências npm
        run: npm install

      - name: Baixar arduino-cli (Windows)
        shell: powershell
        run: |
          # Versão fixada — altere aqui conscientemente ao atualizar.
          # Deve ser a mesma retornada por `arduino-cli version` no seu ambiente dev.
          $ARDUINO_CLI_VERSION = "1.4.1"

          New-Item -ItemType Directory -Force -Path src-tauri/resources/
          if (Test-Path src-tauri/resources/arduino-cli.exe) {
            Remove-Item -Force src-tauri/resources/arduino-cli.exe
          }
          Invoke-WebRequest `
            -Uri "https://downloads.arduino.cc/arduino-cli/arduino-cli_v${ARDUINO_CLI_VERSION}_Windows_64bit.zip" `
            -OutFile arduino-cli.zip
          Expand-Archive arduino-cli.zip -DestinationPath src-tauri/resources/ -Force
          Remove-Item arduino-cli.zip

      - name: Importar certificado PFX
        shell: powershell
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
          $certPath  = "$env:RUNNER_TEMP\bloquin_cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $securePass = ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePass
          Remove-Item $certPath

      - name: Build Tauri (Windows)
        run: npm run tauri build

      - name: Assinar instalador NSIS
        shell: powershell
        run: |
          # Encontra o signtool.exe dinamicamente (independente da versão do Kit)
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" `
            | Where-Object { $_.FullName -match "x64" } `
            | Sort-Object FullName -Descending `
            | Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Error "signtool.exe não encontrado!"
            exit 1
          }

          Write-Host "Usando signtool: $signtool"

          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" `
            -Filter "*.exe" | Select-Object -First 1

          # /n referencia o certificado pelo Subject já importado no store
          # Não precisa de /f nem /p — evita o erro "The /p option requires the /f option"
          & $signtool sign `
            /n "Bloquin" `
            /fd SHA256 `
            /d "Bloquin" `
            /du "https://github.com/${{ github.repository }}" `
            /t "http://timestamp.digicert.com" `
            $installer.FullName

          Write-Host "Assinado: $($installer.FullName)"

      - name: Upload instalador Windows
        uses: actions/upload-artifact@v4
        with:
          name: Bloquin-windows
          path: src-tauri/target/release/bundle/nsis/*.exe