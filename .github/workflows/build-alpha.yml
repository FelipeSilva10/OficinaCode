name: Build Alpha Windows

on:
  push:
    branches:
      - alpha-v1

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependências npm
        run: npm install

      - name: Baixar arduino-cli
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources/
          Invoke-WebRequest -Uri "https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Windows_64bit.zip" -OutFile arduino-cli.zip
          Expand-Archive arduino-cli.zip -DestinationPath src-tauri/resources/ -Force
        shell: powershell

      - name: Build Tauri
        run: npm run tauri build

      - name: Upload instalador
        uses: actions/upload-artifact@v4
        with:
          name: OficinaCode-alpha-v1-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

