name: Build Alpha
on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # BUILD WINDOWS (.exe via NSIS)
  # ──────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Instalar dependências npm
        run: npm install
      - name: Baixar arduino-cli (Windows)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources/
          if (Test-Path src-tauri/resources/arduino-cli.exe) {
            Remove-Item -Force src-tauri/resources/arduino-cli.exe
          }
          Invoke-WebRequest `
            -Uri "https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Windows_64bit.zip" `
            -OutFile arduino-cli.zip
          Expand-Archive arduino-cli.zip -DestinationPath src-tauri/resources/ -Force
          Remove-Item arduino-cli.zip
      - name: Build Tauri (Windows)
        run: npm run tauri build
      - name: Upload instalador Windows
        uses: actions/upload-artifact@v4
        with:
          name: Bloquin-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ──────────────────────────────────────────────────────────────────────────────
  # BUILD LINUX (AppImage)
  # ──────────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar dependências do sistema (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential
          
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Instalar dependências npm
        run: npm install
        
      - name: Baixar arduino-cli (Linux)
        run: |
          mkdir -p src-tauri/resources/
          rm -f src-tauri/resources/arduino-cli
          wget https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz -O arduino-cli.tar.gz
          # Extrai apenas o executável do tar.gz para a pasta resources
          tar -xzf arduino-cli.tar.gz -C src-tauri/resources/ arduino-cli
          rm arduino-cli.tar.gz
          chmod +x src-tauri/resources/arduino-cli
          
      - name: Build Tauri (Linux)
        run: npm run tauri build
        
      - name: Upload instalador Linux (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: Bloquin-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage